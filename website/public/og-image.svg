<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(79,168,213,0.07)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4FA8D5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4FA8D5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="55%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#4FA8D5"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4FA8D5" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060C18"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="560" ry="320" fill="url(#glow)"/>
  <ellipse cx="960" cy="190" rx="400" ry="260" fill="url(#glowBlue)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Top-left logo mark -->
  <circle cx="88" cy="88" r="40" fill="rgba(232,160,32,0.1)" stroke="rgba(232,160,32,0.35)" stroke-width="1.5"/>
  <text x="88" y="97" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="22" fill="#E8A020">A50</text>

  <!-- Brand name -->
  <text x="144" y="100" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#E8EDF5" letter-spacing="-0.5">AURA<tspan fill="#E8A020">50</tspan></text>

  <!-- Badge -->
  <rect x="920" y="60" width="224" height="36" rx="18" fill="rgba(232,160,32,0.1)" stroke="rgba(232,160,32,0.3)" stroke-width="1"/>
  <text x="1032" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#E8A020" letter-spacing="1">MAINNET Q2 2026</text>

  <!-- Main headline -->
  <text x="600" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#E8EDF5" letter-spacing="-2">World's First</text>
  <text x="600" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="url(#textGrad)" letter-spacing="-2">Mobile Blockchain</text>

  <!-- Subtitle -->
  <text x="600" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(232,237,245,0.55)">Real SHA-256 Proof-of-Work · Mine on any smartphone</text>

  <!-- Stat cards -->
  <rect x="108" y="452" width="216" height="112" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(232,160,32,0.25)" stroke-width="1"/>
  <text x="216" y="502" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="36" fill="#E8A020">32 MB</text>
  <text x="216" y="534" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="rgba(232,237,245,0.45)">Full Node Storage</text>

  <rect x="492" y="452" width="216" height="112" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="600" y="502" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="36" fill="#22C55E">SHA-256</text>
  <text x="600" y="534" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="rgba(232,237,245,0.45)">Proof-of-Work</text>

  <rect x="876" y="452" width="216" height="112" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(79,168,213,0.25)" stroke-width="1"/>
  <text x="984" y="502" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="36" fill="#4FA8D5">2G+</text>
  <text x="984" y="534" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="rgba(232,237,245,0.45)">Works Anywhere</text>

  <!-- Bottom URL -->
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(232,237,245,0.25)" letter-spacing="1">aura50.io</text>
</svg>
