<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta (overridden per-route by react-helmet-async) -->
    <title>AURA50 — World's First Mobile-Native Blockchain (2026)</title>
    <meta name="description" content="Mine A50 cryptocurrency on any smartphone. Real SHA-256 PoW. Only 32MB storage. Works on 2G. No ASIC required. 50M token hard cap. Mainnet Q2 2026." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="AURA50 Team" />
    <meta name="theme-color" content="#060C18" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons & manifest -->
    <link rel="icon" type="image/png" href="/coin-face.png" />
    <link rel="apple-touch-icon" href="/coin-face.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="AURA50" />
    <meta property="og:title"       content="AURA50 — World's First Mobile-Native Blockchain (2026)" />
    <meta property="og:description" content="Mine A50 cryptocurrency on any smartphone. Real SHA-256 PoW. Only 32MB storage. Works on 2G networks. No ASIC required." />
    <meta property="og:url"         content="https://aura50.org/" />
    <meta property="og:image"       content="https://aura50.org/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="AURA50 — Mine crypto on any smartphone. 32MB storage. SHA-256 PoW." />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@aura50_io" />
    <meta name="twitter:creator"     content="@aura50_io" />
    <meta name="twitter:title"       content="AURA50 — World's First Mobile-Native Blockchain" />
    <meta name="twitter:description" content="Mine A50 on any smartphone. 32MB storage. Works on 2G. No ASIC required. Mainnet Q2 2026." />
    <meta name="twitter:image"       content="https://aura50.org/og-image.svg" />
    <meta name="twitter:image:alt"   content="AURA50 mobile blockchain stats: 32MB, SHA-256, 2G+ ready" />

    <!-- Canonical -->
    <link rel="canonical" href="https://aura50.org/" />

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Fonts: preconnect then load (3 weights only, not 5) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main>
        <h1>AURA50 — World's First Mobile-Native Blockchain</h1>
        <p>Mine A50 cryptocurrency on any smartphone. Real SHA-256 Proof-of-Work. Only 32MB storage required. Works on 2G networks. No ASIC hardware needed.</p>
        <p>Download the app for <a href="/downloads/aura50.apk">Android</a> or iOS. Mainnet launches Q2 2026.</p>
        <p>Please enable JavaScript to use the full site experience.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
